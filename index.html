<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIDEO OBSCURA</title>

<style>

*{

}

body{

#header{

}

#hint{

position:fixed;

bottom:20px;

#gallery{

scroll-behavior:smooth;

#gallery::-webkit-scrollbar{

#gallery::-webkit-scrollbar-thumb{

.slide{

flex:0 0 100vw;

}

.card{

}

.card h2{

font-weight:normal;

margin-bottom:10px;

}

.meta{

font-size:14px;

color:#666;

margin-bottom:25px;

letter-spacing:1px;

text-transform:uppercase;

}

iframe{

width:100%;

aspect-ratio:16/9;

border:0;

background:black;

}

.desc{

margin-top:25px;

font-size:18px;

line-height:1.8;

color:#444;

max-width:760px;

}

.number{

margin-top:25px;

font-size:13px;

letter-spacing:3px;

color:#888;

}

</style>

</head>

<body>

<div id="header">

<h1>VIDEO OBSCURA</h1>

<p>

A curated archive of forgotten home videos,
local television and strange audiovisual artifacts
found across YouTube.

</p>

</div>

<div id="hint">

← desplazate horizontalmente →

</div>

<div id="gallery"></div>

<script>

const videos=[

{

title:"Tape #001",

year:"Unknown",

},

{

},

{

description:"Preserved for the archive."

},

{

title:"Tape #004",

youtube:"J1NHGypezNw",

},

{

title:"Tape #005",

year:"Unknown",

},

{

title:"Tape #006",

year:"Unknown",

country:"Unknown",

},

{

title:"Tape #007",

youtube:"o1d28X0lkJ4",

year:"Unknown",

country:"Unknown",

description:"Another accidental masterpiece."

}

];

const gallery=document.getElementById("gallery");

videos.forEach((video,index)=>{

const slide=document.createElement("section");

slide.className="slide";

slide.innerHTML=`

<div class="card">

<h2>${video.title}</h2>

<div class="meta">

${video.year} · ${video.country}

</div>

<iframe

src="https://www.youtube.com/embed/${video.youtube}"

loading="lazy"

allowfullscreen>

</iframe>

<div class="desc">

${video.description}

</div>

<div class="number">

ARCHIVE ${String(index+1).padStart(4,"0")}

</div>

</div>

`;

gallery.appendChild(slide);

});

window.addEventListener("wheel",function(e){

if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){

e.preventDefault();

gallery.scrollLeft+=e.deltaY;

}

},{passive:false});

</script>

</body>

</html>
