<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<style>

</head>

<body>

<div id="container">

<header>

<h1>VIDEO OBSCURA</h1>

<div class="subtitle">

A curated archive of forgotten videos found across YouTube.

</div>

<hr>

</header>

<main id="archive">

</main>

<footer>

<hr>

Every tape deserves another chance.

</footer>

</div>

<script>

const videos=[

{

title:"Tape #001",

youtube:"gdYRYbjLehg",

text:"Recovered from the digital wilderness."

},

{

title:"Tape #002",

youtube:"zElvf4zL4os",

text:"An almost forgotten audiovisual fragment."

},

{

title:"Tape #003",

text:"Preserved for the archive."

},

{

title:"Tape #004",

youtube:"J1NHGypezNw",

text:"A mysterious recording that somehow survived."

},

{

title:"Tape #005",

youtube:"gqn6bDA0B9k",

text:"Another strange signal from YouTube."

},

{

title:"Tape #006",

youtube:"b7HtHD8i0XU",

text:"An accidental masterpiece."

},

{

title:"Tape #007",

youtube:"o1d28X0lkJ4",

text:"Filed into the archive before disappearing."

}

];

const archive=document.getElementById("archive");

videos.forEach(video=>{

const article=document.createElement("article");

article.className="entry";

article.innerHTML=`

<h2>${video.title}</h2>

<iframe
src="https://www.youtube.com/embed/${video.youtube}"
allowfullscreen
loading="lazy">
</iframe>

<p>${video.text}</p>

`;

archive.appendChild(article);

});

</script>

</body>
</html>
