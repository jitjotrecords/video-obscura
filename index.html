<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VIDEO OBSCURA</title>

    <meta name="description"
        content="Archivo de videos caseros, televisión olvidada y rarezas audiovisuales.">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>VIDEO OBSCURA</h1>

        <p>
            Un archivo de cintas perdidas de Internet
        </p>

    </header>

    <main>

        <section id="toolbar">

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar entre las cintas..."
                autocomplete="off">

            <button id="randomButton">
                🎲 Abrir una cinta al azar
            </button>

        </section>

        <section>

            <h2>Cinta destacada</h2>

            <div id="featuredVideo">

                Cargando...

            </div>

        </section>

        <section>

            <h2>Archivo</h2>

            <div id="videoGrid">

            </div>

        </section>

    </main>

    <footer>

        <p>

            VIDEO OBSCURA

        </p>

    </footer>

    <script src="js/app.js"></script>

</body>

</html>
