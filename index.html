```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VIDEO OBSCURA TV</title>

<style>

html,
body{

margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;

}

#player{

position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;

}

#overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
color:white;
font-size:28px;
letter-spacing:8px;
opacity:0;
pointer-events:none;
transition:.3s;

}

#overlay.show{

opacity:.92;

}

#hud{

position:fixed;
top:20px;
left:20px;
z-index:1000;
color:white;
font-size:12px;
letter-spacing:3px;
opacity:.35;
transition:.3s;

}

#hud:hover{

opacity:1;

}

#bottom{

position:fixed;
bottom:20px;
left:20px;
z-index:1000;
display:flex;
gap:10px;

}

button{

background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.25);
color:white;
padding:10px 14px;
cursor:pointer;
backdrop-filter:blur(4px);

}

button:hover{

background:rgba(255,255,255,.22);

}

</style>

</head>

<body>

<div id="player"></div>

<div id="overlay">

TRACKING...

</div>

<div id="hud">

VIDEO OBSCURA TV

</div>

<div id="bottom">

<button onclick="previousVideo()">
◀
</button>

<button onclick="randomVideo()">
RANDOM
</button>

<button onclick="nextVideo()">
▶
</button>

</div>

<script>

const videos=[

"gdYRYbjLehg",
"zElvf4zL4os",
"RUsUQ9tRHHQ",
"J1NHGypezNw",
"gqn6bDA0B9k",
"b7HtHD8i0XU",
"o1d28X0lkJ4"

];

let player;

let order=[];

let pointer=0;

function shuffle(){

order=[...videos];

for(let i=order.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[order[i],order[j]]=[order[j],order[i]];

}

pointer=0;

}

shuffle();

function showTracking(callback){

const overlay=document.getElementById("overlay");

overlay.classList.add("show");

setTimeout(()=>{

overlay.classList.remove("show");

callback();

},800);

}

function loadCurrent(){

player.loadVideoById(order[pointer]);

}

function nextVideo(){

pointer++;

if(pointer>=order.length){

shuffle();

}

showTracking(loadCurrent);

}

function previousVideo(){

pointer--;

if(pointer<0){

pointer=order.length-1;

}

showTracking(loadCurrent);

}

function randomVideo(){

pointer=Math.floor(Math.random()*order.length);

showTracking(loadCurrent);

}

function onYouTubeIframeAPIReady(){

player=new YT.Player("player",{

width:"100%",

height:"100%",

videoId:order[pointer],

playerVars:{

controls:1,
rel:0,
modestbranding:1,
playsinline:1

},

events:{

onStateChange:function(event){

if(event.data===YT.PlayerState.ENDED){

nextVideo();

}

}

}

});

}

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){

nextVideo();

}

if(e.key==="ArrowLeft"){

previousVideo();

}

if(e.key==="r" || e.key==="R"){

randomVideo();

}

});

</script>

<script src="https://www.youtube.com/iframe_api"></script>

</body>

</html>
