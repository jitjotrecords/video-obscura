<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VIDEO OBSCURA</title>

<style>

html,
body{

margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
cursor:none;

}

#player{

position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;

}

#overlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
pointer-events:none;
font-family:Arial,sans-serif;
font-size:18px;
letter-spacing:6px;
color:white;
opacity:0;
transition:opacity .4s;

}

.flash{

animation:flash .8s;

}

@keyframes flash{

0%{
opacity:0;
}

50%{
opacity:.6;
}

100%{
opacity:0;
}

}

</style>

</head>

<body>

<div id="player"></div>

<div id="overlay">
LOADING NEXT TAPE...
</div>

<script>

const videos=[

"gdYRYbjLehg",

"zElvf4zL4os",

"RUsUQ9tRHHQ",

"J1NHGypezNw",

"gqn6bDA0B9k",

"b7HtHD8i0XU",

"o1d28X0lkJ4"

];

let player;

let current=-1;

function randomVideo(){

if(videos.length===1){

return 0;

}

let n;

do{

n=Math.floor(Math.random()*videos.length);

}

while(n===current);

return n;

}

function nextVideo(){

const overlay=document.getElementById("overlay");

overlay.classList.remove("flash");

void overlay.offsetWidth;

overlay.classList.add("flash");

current=randomVideo();

player.loadVideoById(videos[current]);

}

function onYouTubeIframeAPIReady(){

current=randomVideo();

player=new YT.Player("player",{

width:"100%",

height:"100%",

videoId:videos[current],

playerVars:{

autoplay:1,

controls:0,

rel:0,

modestbranding:1,

playsinline:1,

fs:1

},

events:{

onStateChange:function(event){

if(event.data===YT.PlayerState.ENDED){

nextVideo();

}

}

}

});

}

document.body.addEventListener("click",()=>{

const el=document.documentElement;

if(el.requestFullscreen){

el.requestFullscreen();

}

});

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){

e.preventDefault();

nextVideo();

}

});

</script>

<script src="https://www.youtube.com/iframe_api"></script>

</body>

</html>
