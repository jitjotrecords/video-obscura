<h1>VIDEO OBSCURA</h1>

<p>

A curated archive of forgotten videos found across YouTube.

</p>

</header>

<div id="playerContainer">

<div id="player"></div>

<div id="info">

<div id="title"></div>

<div id="description"></div>

<div id="counter"></div>

</div>

</div>

<div id="controls">

<button onclick="previousVideo()">
◀ PREVIOUS
</button>

<button onclick="nextRandomVideo()">
▶ NEXT TAPE
</button>

</div>

<footer>

Every tape deserves another chance.

</footer>

<script>

const videos=[

{
title:"Tape #001",
id:"gdYRYbjLehg",
description:"Recovered from the digital wilderness."
},

{
title:"Tape #002",
id:"zElvf4zL4os",
description:"An almost forgotten audiovisual fragment."
},

{
title:"Tape #003",
id:"RUsUQ9tRHHQ",
description:"Preserved for the archive."
},

{
title:"Tape #004",
id:"J1NHGypezNw",
description:"Nobody expected this recording to survive."
},

{
title:"Tape #005",
id:"gqn6bDA0B9k",
description:"A strange signal still floating around YouTube."
},

{
title:"Tape #006",
id:"b7HtHD8i0XU",
description:"Filed into the archive."
},

{
title:"Tape #007",
id:"o1d28X0lkJ4",
description:"Another accidental masterpiece."
}

];

let currentIndex=0;
let player;

function updateInfo(){

document.getElementById("title").textContent=
videos[currentIndex].title;

document.getElementById("description").textContent=
videos[currentIndex].description;

document.getElementById("counter").textContent=
"ARCHIVE "+String(currentIndex+1).padStart(4,"0");

}

function loadVideo(index){

currentIndex=index;

player.loadVideoById(videos[currentIndex].id);

updateInfo();

}

function nextRandomVideo(){

let next;

do{

next=Math.floor(Math.random()*videos.length);

}while(next===currentIndex && videos.length>1);

loadVideo(next);

}

function previousVideo(){

currentIndex--;

if(currentIndex<0){

currentIndex=videos.length-1;

}

loadVideo(currentIndex);

}

function onYouTubeIframeAPIReady(){

player=new YT.Player('player',{

videoId:videos[0].id,

playerVars:{
rel:0,
modestbranding:1
},

events:{

'onReady':function(){

updateInfo();

},

'onStateChange':function(event){

if(event.data===YT.PlayerState.ENDED){

nextRandomVideo();

}

}

}

});

}

</script>

<script src="https://www.youtube.com/iframe_api"></script>

</body>
